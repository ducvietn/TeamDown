# ============================================================
# TeamUp — Application Configuration
# ============================================================
# Default values work for LOCAL dev.
# On Railway, override via Environment Variables in the dashboard.
# ============================================================

spring.application.name=TeamUp
server.port=${PORT:8080}

# --------------------------------------------------------
# PostgreSQL DataSource  (Railway provides DATABASE_URL)
# --------------------------------------------------------
# Option A — use Railway's DATABASE_URL env var directly:
#   spring.datasource.url=${DATABASE_URL}
#
# Option B — individual vars (used by this config):
spring.datasource.url=${JDBC_DATABASE_URL:jdbc:postgresql://localhost:5432/teamup_db}
spring.datasource.username=${JDBC_DATABASE_USERNAME:postgres}
spring.datasource.password=${JDBC_DATABASE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# --------------------------------------------------------
# MySQL Configuration  (uncomment to switch)
# --------------------------------------------------------
# spring.datasource.url=${JDBC_DATABASE_URL:jdbc:mysql://localhost:3306/teamup_db}
# spring.datasource.username=${JDBC_DATABASE_USERNAME:root}
# spring.datasource.password=${JDBC_DATABASE_PASSWORD:root}
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --------------------------------------------------------
# JPA / Hibernate
# --------------------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# --------------------------------------------------------
# MongoDB — GridFS (PDF file storage)
# On Railway: Set MONGO_URL to your MongoDB plugin connection string
# --------------------------------------------------------
spring.data.mongodb.uri=${MONGO_URL:mongodb://localhost:27017}
spring.data.mongodb.database=${MONGO_DATABASE:teamup}

# Multipart file upload limits
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# --------------------------------------------------------
# Miscellaneous
# --------------------------------------------------------
spring.jpa.open-in-view=false
